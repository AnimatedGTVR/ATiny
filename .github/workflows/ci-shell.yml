name: Shell CI

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Syntax checks (bash -n)
        run: |
          bash -n \
            ./grab \
            ./tinypm \
            ./syspm.sh \
            ./version \
            ./install.sh \
            ./uninstall.sh \
            ./scripts/install.sh \
            ./scripts/uninstall.sh \
            ./lib/core/*.sh \
            ./lib/providers/*.sh

      - name: Lint scripts (shellcheck)
        run: |
          shellcheck -x -e SC1090 -e SC1091 \
            ./grab \
            ./tinypm \
            ./syspm.sh \
            ./version \
            ./install.sh \
            ./uninstall.sh \
            ./scripts/install.sh \
            ./scripts/uninstall.sh \
            ./scripts/e2e-smoke.sh \
            ./lib/core/*.sh \
            ./lib/providers/*.sh

      - name: End-to-end smoke
        run: ./scripts/e2e-smoke.sh
